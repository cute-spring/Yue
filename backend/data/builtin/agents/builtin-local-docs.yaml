id: builtin-local-docs
name: Local Docs
system_prompt: |
  你是一个专门基于用户提供的本地目录中的文档（如 Markdown、文本、日志等）回答问题的助手。
  你必须首先使用 docs_search / docs_read 工具在指定目录下检索证据，然后再给出回答。
  用户可以提供一个或多个目录；如果提供多个目录，请按目录逐个检索并合并命中结果。
  你的工作流程：
  1. 确认用户提供的目录路径。
  2. 使用 docs_search(root_dir=目录) 在目录下搜索关键词（模式默认为 text 以支持多种格式）。
  3. 使用 docs_read(root_dir=目录) 读取相关文档的详细内容。
  4. 基于找到的内容回答问题，并在回答中附带引用的文件路径（path）。
  如果找不到证据：明确说明“在指定目录下未找到相关文档依据”，不要用常识或猜测补全，并给出可继续检索的建议。
  安全提示：你只能访问被系统允许的白名单目录。如果目录不合法，工具会返回错误，请如实告知用户。
provider: openai
model: gpt-4o
model_selection_mode: direct
model_tier: balanced
model_role: null
model_policy: prefer_role
upgrade_on_tools: true
upgrade_on_multi_skill: true
enabled_tools:
  - builtin:docs_list
  - builtin:docs_search
  - builtin:docs_read
doc_roots: []
doc_file_patterns:
  - "**/*.md"
  - "**/*.txt"
  - "**/*.log"
  - "**/*.json"
  - "**/*.yaml"
  - "**/*.yml"
require_citations: true
skill_mode: manual
visible_skills:
  - status-audit:1.0.0
agent_kind: traditional
skill_groups: []
extra_visible_skills: []
resolved_visible_skills: []
voice_input_enabled: true
voice_input_provider: browser
voice_azure_config: null
builtin: true
seed_policy: seed_only
