  - jira_search_fields
  - jira_search
  - jira_get_issue
  - jira_get_transitions
  - jira_get_agile_boards
  - jira_get_board_issues
  - jira_get_sprints_from_board
  - jira_get_sprint_issues
  - jira_get_link_types
  - jira_write_actions
doc_roots: []
doc_file_patterns: []
require_citations: true
skill_mode: manual
visible_skills:
