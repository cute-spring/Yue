name: Release Readiness Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Release Readiness Gate Check
        run: |
          python scripts/check_gate_completeness.py --report docs/release_readiness_gate/phase1/gate_reports/RRG-20260314-001.md

  contract-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Run Unified Contract Gate Tests
        run: |
          pytest backend/tests/test_contract_gate_unit.py

  smoke-e2e-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Start frontend
        run: |
          cd frontend
          npm run dev -- --host 127.0.0.1 --port 3000 > /tmp/yue-frontend.log 2>&1 &
      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start"
          cat /tmp/yue-frontend.log || true
          exit 1
      - name: Run frontend smoke e2e
        run: |
          cd frontend
          npx playwright test e2e/title-refinement.spec.ts e2e/chat-paste-image.spec.ts e2e/advanced-mode-sync.spec.ts e2e/feature-flags-sync.spec.ts --reporter=line
